<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#176467"/>
      <stop offset="60%" stop-color="#0E3E41"/>
      <stop offset="100%" stop-color="#07222A"/>
    </radialGradient>

    <linearGradient id="gold" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E6C078"/>
      <stop offset="55%" stop-color="#C09240"/>
      <stop offset="100%" stop-color="#8A6821"/>
    </linearGradient>

    <linearGradient id="goldSoft" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D8B26E"/>
      <stop offset="100%" stop-color="#A07B2D"/>
    </linearGradient>

    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="5" in="SourceGraphic" result="b2"/>
      <feColorMatrix in="b2" type="matrix" values="1 0 0 0 0.75  0 1 0 0 0.5  0 0 1 0 0.15  0 0 0 0.65 0" result="b2c"/>
      <feMerge>
        <feMergeNode in="b2c"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Refined card suits -->
    <symbol id="spade" viewBox="0 0 40 40">
      <path d="M 20 4 C 27 10 35 17 35 24 C 35 29 32 31 28 31 C 26 31 23 30 21 28 C 21 31 22 33 23 36 L 17 36 C 18 33 19 31 19 28 C 17 30 14 31 12 31 C 8 31 5 29 5 24 C 5 17 13 10 20 4 Z"/>
    </symbol>
    <symbol id="heart" viewBox="0 0 40 40">
      <path d="M 20 35 C 17 32 5 24 5 15 C 5 9 9 5 13 5 C 17 5 19 8 20 10 C 21 8 23 5 27 5 C 31 5 35 9 35 15 C 35 24 23 32 20 35 Z"/>
    </symbol>
    <symbol id="diamond" viewBox="0 0 40 40">
      <path d="M 20 4 L 34 20 L 20 36 L 6 20 Z"/>
    </symbol>
    <symbol id="club" viewBox="0 0 40 40">
      <path d="M 20 5 C 16 5 13 8 13 12 C 13 14 13 15 14 17 C 12 15 11 15 9 15 C 6 15 3 18 3 22 C 3 25 6 28 9 28 C 12 28 13 27 14 25 C 13 29 12 32 10 36 L 30 36 C 28 32 27 29 26 25 C 27 27 28 28 31 28 C 34 28 37 25 37 22 C 37 18 34 15 31 15 C 29 15 28 15 26 17 C 27 15 27 14 27 12 C 27 8 24 5 20 5 Z"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Starburst rays behind TAG — subtle -->
  <g transform="translate(256 256)" opacity="0.18">
    <g fill="url(#gold)">
      <polygon points="0,-210 4,0 -4,0"/>
      <polygon points="0,210 4,0 -4,0"/>
      <polygon points="-210,0 0,-4 0,4"/>
      <polygon points="210,0 0,-4 0,4"/>
      <g transform="rotate(45)"><polygon points="0,-190 3,0 -3,0"/><polygon points="0,190 3,0 -3,0"/><polygon points="-190,0 0,-3 0,3"/><polygon points="190,0 0,-3 0,3"/></g>
      <g transform="rotate(22.5)" opacity="0.5"><polygon points="0,-170 2.5,0 -2.5,0"/><polygon points="0,170 2.5,0 -2.5,0"/><polygon points="-170,0 0,-2.5 0,2.5"/><polygon points="170,0 0,-2.5 0,2.5"/></g>
      <g transform="rotate(67.5)" opacity="0.5"><polygon points="0,-170 2.5,0 -2.5,0"/><polygon points="0,170 2.5,0 -2.5,0"/><polygon points="-170,0 0,-2.5 0,2.5"/><polygon points="170,0 0,-2.5 0,2.5"/></g>
    </g>
  </g>

  <!-- Vegas-shield diamond frame, elegant -->
  <polygon points="256,56 456,256 256,456 56,256" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.9"/>
  <polygon points="256,72 440,256 256,440 72,256" fill="none" stroke="url(#goldSoft)" stroke-width="1" opacity="0.55"/>

  <!-- Marquee light dots at diamond points + midpoints -->
  <g fill="#E6C078" filter="url(#softGlow)">
    <circle cx="256" cy="56" r="5"/>
    <circle cx="456" cy="256" r="5"/>
    <circle cx="256" cy="456" r="5"/>
    <circle cx="56" cy="256" r="5"/>
  </g>
  <g fill="#D8B26E" opacity="0.75">
    <circle cx="356" cy="156" r="3"/>
    <circle cx="356" cy="356" r="3"/>
    <circle cx="156" cy="356" r="3"/>
    <circle cx="156" cy="156" r="3"/>
    <circle cx="306" cy="106" r="2"/>
    <circle cx="406" cy="206" r="2"/>
    <circle cx="406" cy="306" r="2"/>
    <circle cx="306" cy="406" r="2"/>
    <circle cx="206" cy="406" r="2"/>
    <circle cx="106" cy="306" r="2"/>
    <circle cx="106" cy="206" r="2"/>
    <circle cx="206" cy="106" r="2"/>
  </g>

  <!-- TAG text with subtle neon -->
  <text x="256" y="278"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="165"
        font-weight="900"
        fill="url(#gold)"
        text-anchor="middle"
        letter-spacing="-3"
        filter="url(#neonGlow)">TAG</text>

  <!-- Divider with tiny gold pip -->
  <g transform="translate(256 316)">
    <line x1="-72" y1="0" x2="-14" y2="0" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
    <line x1="14" y1="0" x2="72" y2="0" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
    <polygon points="0,-7 7,0 0,7 -7,0" fill="url(#goldSoft)"/>
  </g>

  <!-- VEGAS EXPO -->
  <text x="256" y="365"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="32"
        font-weight="700"
        fill="url(#gold)"
        text-anchor="middle"
        letter-spacing="8">VEGAS EXPO</text>

  <!-- '26 -->
  <text x="256" y="400"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="18"
        font-weight="500"
        fill="#D8B26E"
        text-anchor="middle"
        letter-spacing="7"
        opacity="0.65">&apos;26</text>

  <!-- Card suits at corners — SMALL and subtle -->
  <g fill="url(#goldSoft)" opacity="0.5">
    <use href="#spade" x="76" y="76" width="24" height="24"/>
    <use href="#heart" x="412" y="76" width="24" height="24"/>
    <use href="#club" x="76" y="412" width="24" height="24"/>
    <use href="#diamond" x="412" y="412" width="24" height="24"/>
  </g>
</svg>
