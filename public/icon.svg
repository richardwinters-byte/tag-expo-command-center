<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#176467"/>
      <stop offset="60%" stop-color="#0E3E41"/>
      <stop offset="100%" stop-color="#07222A"/>
    </radialGradient>

    <linearGradient id="gold" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E6C078"/>
      <stop offset="55%" stop-color="#C09240"/>
      <stop offset="100%" stop-color="#8A6821"/>
    </linearGradient>

    <linearGradient id="goldSoft" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D8B26E"/>
      <stop offset="100%" stop-color="#A07B2D"/>
    </linearGradient>

    <linearGradient id="pocketDark" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0D4044"/>
      <stop offset="100%" stop-color="#06272B"/>
    </linearGradient>
    <linearGradient id="pocketLight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1A6569"/>
      <stop offset="100%" stop-color="#0E4347"/>
    </linearGradient>

    <radialGradient id="hub" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1A6569"/>
      <stop offset="100%" stop-color="#0A2C30"/>
    </radialGradient>

    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="b1"/>
      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="b2"/>
      <feColorMatrix in="b2" type="matrix" values="1 0 0 0 0.75  0 1 0 0 0.5  0 0 1 0 0.15  0 0 0 0.5 0" result="b2c"/>
      <feMerge>
        <feMergeNode in="b2c"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card suits -->
    <symbol id="spade" viewBox="0 0 40 40">
      <path d="M 20 4 C 27 10 35 17 35 24 C 35 29 32 31 28 31 C 26 31 23 30 21 28 C 21 31 22 33 23 36 L 17 36 C 18 33 19 31 19 28 C 17 30 14 31 12 31 C 8 31 5 29 5 24 C 5 17 13 10 20 4 Z"/>
    </symbol>
    <symbol id="heart" viewBox="0 0 40 40">
      <path d="M 20 35 C 17 32 5 24 5 15 C 5 9 9 5 13 5 C 17 5 19 8 20 10 C 21 8 23 5 27 5 C 31 5 35 9 35 15 C 35 24 23 32 20 35 Z"/>
    </symbol>
    <symbol id="diamond" viewBox="0 0 40 40">
      <path d="M 20 4 L 34 20 L 20 36 L 6 20 Z"/>
    </symbol>
    <symbol id="club" viewBox="0 0 40 40">
      <path d="M 20 5 C 16 5 13 8 13 12 C 13 14 13 15 14 17 C 12 15 11 15 9 15 C 6 15 3 18 3 22 C 3 25 6 28 9 28 C 12 28 13 27 14 25 C 13 29 12 32 10 36 L 30 36 C 28 32 27 29 26 25 C 27 27 28 28 31 28 C 34 28 37 25 37 22 C 37 18 34 15 31 15 C 29 15 28 15 26 17 C 27 15 27 14 27 12 C 27 8 24 5 20 5 Z"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Thin gold outer rim -->
  <circle cx="256" cy="256" r="206" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.85"/>
  <circle cx="256" cy="256" r="198" fill="none" stroke="url(#goldSoft)" stroke-width="0.8" opacity="0.5"/>

  <!-- Pocket ring: darker teal base + alternating lighter teal (subtle, NOT gold) -->
  <circle cx="256" cy="256" r="174"
          fill="none"
          stroke="url(#pocketDark)"
          stroke-width="48"/>
  <circle cx="256" cy="256" r="174"
          fill="none"
          stroke="url(#pocketLight)"
          stroke-width="48"
          stroke-dasharray="60.7 60.7"
          transform="rotate(-90 256 256)"/>

  <!-- Thin gold separator spokes between pockets (18 marks, subtle) -->
  <g stroke="url(#gold)" stroke-width="0.9" opacity="0.65">
    <line x1="256" y1="150" x2="256" y2="198"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(20 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(40 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(60 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(80 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(100 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(120 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(140 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(160 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(180 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(200 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(220 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(240 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(260 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(280 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(300 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(320 256 256)"/>
    <line x1="256" y1="150" x2="256" y2="198" transform="rotate(340 256 256)"/>
  </g>

  <!-- Thin inner/outer rims on the pocket ring -->
  <circle cx="256" cy="256" r="198" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.55"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.55"/>

  <!-- Ball — small, understated -->
  <circle cx="256" cy="124" r="4" fill="#E6C078" opacity="0.9"/>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="118" fill="url(#hub)"/>
  <circle cx="256" cy="256" r="118" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.85"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#goldSoft)" stroke-width="0.5" opacity="0.5"/>

  <!-- TAG text — clean -->
  <text x="256" y="258"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="72"
        font-weight="800"
        fill="url(#gold)"
        text-anchor="middle"
        letter-spacing="-1.5"
        filter="url(#neonGlow)">TAG</text>

  <!-- Divider -->
  <line x1="218" y1="280" x2="294" y2="280" stroke="url(#goldSoft)" stroke-width="0.8" opacity="0.55"/>

  <!-- VEGAS EXPO -->
  <text x="256" y="304"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="13"
        font-weight="600"
        fill="#D8B26E"
        text-anchor="middle"
        letter-spacing="3.5"
        opacity="0.9">VEGAS EXPO</text>

  <!-- '26 -->
  <text x="256" y="324"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        font-weight="500"
        fill="#D8B26E"
        text-anchor="middle"
        letter-spacing="5"
        opacity="0.6">&apos;26</text>

  <!-- Tiny center pin -->
  <circle cx="256" cy="256" r="3" fill="url(#gold)"/>

  <!-- Card suits at corners — small and subtle -->
  <g fill="url(#goldSoft)" opacity="0.5">
    <use href="#spade" x="52" y="52" width="24" height="24"/>
    <use href="#heart" x="436" y="52" width="24" height="24"/>
    <use href="#club" x="52" y="436" width="24" height="24"/>
    <use href="#diamond" x="436" y="436" width="24" height="24"/>
  </g>
</svg>
